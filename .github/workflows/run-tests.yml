---
# used for running tests
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre_commit_checks:
    runs-on: ubuntu-24.04
    steps:
      # checks out the repo
      - uses: actions/checkout@v7.0.0
      # run pre-commit
      - name: Python setup
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
      # use prek for speedy precommit results
      - uses: j178/prek-action@v2.0.5
      # run pre-commit ci lite for automated fixes
      - uses: pre-commit-ci/lite-action@v1.1.0
        if: ${{ !cancelled() }}
  run_tests:
    strategy:
      matrix:
        # keep CI small for a prototype: Linux only, at the supported-range ends
        python_version: ["3.11", "3.13"]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Python setup
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Run pytest
        run: uv run --frozen pytest
